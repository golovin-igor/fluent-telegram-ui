version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      microsoft-extensions:
        patterns:
          - "Microsoft.Extensions.*"
      test-packages:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk"
          - "coverlet.collector"
          - "Moq"
          - "FluentAssertions"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
