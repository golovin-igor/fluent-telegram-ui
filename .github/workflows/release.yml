name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FluentTelegramUI.sln

      - name: Build
        run: dotnet build FluentTelegramUI.sln --no-restore -c Release

      - name: Test
        run: dotnet test FluentTelegramUI.sln --no-build -c Release --verbosity normal

      - name: Pack
        run: dotnet pack FluentTelegramUI/FluentTelegramUI.csproj --no-build -c Release -o ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::warning::NUGET_API_KEY secret is not set — packages were built but not published to nuget.org"
            exit 0
          fi
          dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          if compgen -G "./artifacts/*.snupkg" > /dev/null; then
            dotnet nuget push ./artifacts/*.snupkg --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY" --skip-duplicate
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/*.nupkg
            artifacts/*.snupkg
          generate_release_notes: true
