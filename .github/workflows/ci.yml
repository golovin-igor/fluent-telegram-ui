name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly dependency freshness check (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for outdated packages
        run: dotnet list package --outdated --include-transitive
        continue-on-error: true

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage"

      - name: Build samples
        run: dotnet build samples/ --no-restore -c Release

      - name: Pack
        run: dotnet pack FluentTelegramUI/FluentTelegramUI.csproj --no-build -c Release
