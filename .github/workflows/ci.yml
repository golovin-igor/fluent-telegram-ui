name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Weekly dependency freshness check (Monday 06:00 UTC)
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore FluentTelegramUI.sln

      - name: Check for outdated packages
        run: dotnet list FluentTelegramUI.sln package --outdated --include-transitive
        continue-on-error: true

      - name: Build
        run: dotnet build FluentTelegramUI.sln --no-restore -c Release

      - name: Test
        run: dotnet test FluentTelegramUI.sln --no-build -c Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/**/coverage.cobertura.xml
          if-no-files-found: ignore

      - name: Pack
        run: dotnet pack FluentTelegramUI/FluentTelegramUI.csproj --no-build -c Release
